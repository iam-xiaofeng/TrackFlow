# TrackFlow 服务器配置

server:
  port: 9001
  threads: 8

yolo:
  model_path: "models/3class410.onnx"
  input_width: 1024
  input_height: 1024
  confidence: 0.5
  nms_threshold: 0.45
  is_obb: true
  use_cuda: true
  ort_threads: 4
  batch_size: 6
  batch_wait_ms: 30
  batch_max_pending: 16
  class_names: ["car", "pedestrian", "two-wheeler"]

tracker:
  track_thresh: 0.5
  high_thresh: 0.6
  match_thresh: 0.8
  max_time_lost: 30
  min_hits: 3

features:
  tracker: true
  undistort: false
  geo_transform: false

limits:
  session_timeout_sec: 300
  max_payload_bytes: 104857600
  max_pending_tasks: 32
  max_pending_batches: 16
  max_requests_per_session: 8
  confidence_min: 0.05
  confidence_max: 0.95
  nms_min: 0.10
  nms_max: 0.95
  tracker_thresh_min: 0.05
  tracker_thresh_max: 0.99
  match_thresh_min: 0.10
  match_thresh_max: 0.99

logging:
  level: "info"

# MySQL (M1: EventWriter 写入交通事件)
# 密码: scripts/setup_mysql.sh 默认 trackflow_dev_2026
# 也可改用环境变量, 启动前 sed 替换
mysql:
  host: "127.0.0.1"
  port: 3306
  user: "trackflow"
  password: "trackflow_dev_2026"
  db: "trackflow"
  max_queue_size: 10000

# TrafficAnalyzer (M1: 默认不挂入 pipeline, 需要时显式加 traffic_analyzer)
traffic_analyzer:
  intersection_id: "A001"
  camera_id: "default"
  enabled: true
